<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quanment - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9fafb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        nav {
            background: #ffffff;
            border-bottom: 0.5px solid #e5e7eb;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: #1db954;
            font-size: 22px;
            font-weight: 600;
            text-decoration: none;
        }

        nav a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover {
            color: #1db954;
        }

        /* Banner */
        .banner {
            background: #f0fdf4;
            border-left: 4px solid #1db954;
            padding: 16px 32px;
            font-size: 16px;
            color: #166534;
            text-align: center;
        }

        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        /* Login Card */
        .card {
            background: #ffffff;
            border: 0.5px solid #e5e7eb;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }

        .card h2 {
            font-size: 22px;
            font-weight: 500;
            color: #111827;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        /* Form */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: #374151;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 0.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            color: #111827;
            background: #f9fafb;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #1db954;
            background: #ffffff;
        }

        /* Button */
        .btn-primary {
            width: 100%;
            padding: 11px;
            background: #1db954;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-primary:hover {
            background: #17a349;
        }

        /* Google Button */
        .btn-google {
            width: 100%;
            padding: 11px;
            background: #ffffff;
            color: #374151;
            border: 0.5px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-google:hover {
            background: #f9fafb;
        }

        .btn-google img {
            width: 18px;
            height: 18px;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
        }

        .divider hr {
            flex: 1;
            border: none;
            border-top: 0.5px solid #e5e7eb;
        }

        .divider span {
            font-size: 12px;
            color: #9ca3af;
        }

        /* Footer link */
        .footer-link {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #6b7280;
        }

        .footer-link a {
            color: #1db954;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        /* Error message */
        .error-msg {
            background: #fef2f2;
            border: 0.5px solid #fecaca;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: #dc2626;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <a href="index.html" class="logo">Quanment</a>
        <a href="signup.html">Sign Up</a>
    </nav>

    <!-- Banner -->
    <div class="banner">
        Welcome To Quantity Measurement
    </div>

    <!-- Main Content -->
    <div class="main">
        <div class="card">
            <h2>Welcome back</h2>
            <p>Login to your Quanment account</p>

            <!-- Error Message -->
            <div class="error-msg" id="errorMsg">
                Invalid username or password. Please try again.
            </div>

            <!-- Login Form -->
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" 
                       placeholder="Enter your username" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" 
                       placeholder="Enter your password" />
            </div>

            <button class="btn-primary" onclick="handleLogin()">
                Login
            </button>

            <div class="divider">
                <hr /> <span>or</span> <hr />
            </div>

            <!-- Google Login -->
            <button class="btn-google" onclick="handleGoogleLogin()">
                <img src="https://www.google.com/favicon.ico" alt="Google" />
                Continue with Google
            </button>

            <div class="footer-link">
                Don't have an account? 
                <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Please fill in all fields.';
                return;
            }

            // Call Spring Boot login API
            fetch('http://localhost:8080/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.token) {
                    // Save token to localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.username);
                    // Redirect to main app
                    window.location.href = 'app.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = 'Login failed. Please try again.';
                }
            })
            .catch(() => {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Cannot connect to server.';
            });
        }

        function handleGoogleLogin() {
            // Redirect to Spring Boot Google OAuth2
            window.location.href = 
                'http://localhost:8080/oauth2/authorization/google';
        }
    </script>

</body>
</html>
